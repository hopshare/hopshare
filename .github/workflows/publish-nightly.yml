name: Publish Nightly Image

on:
  schedule:
    # GitHub schedules are UTC. These two entries cover 10:00 PM America/New_York
    # across DST shifts; the precheck below enforces exact local-hour execution.
    - cron: "0 2 * * *"
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-nightly
  cancel-in-progress: false

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.check.outputs.should_publish }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check for commits from today (America/New_York) and local 10 PM window
        id: check
        env:
          LOCAL_TIMEZONE: America/New_York
        run: |
          latest_commit_date="$(git log -1 --format=%cI)"
          latest_commit_day_local="$(TZ="${LOCAL_TIMEZONE}" date -d "${latest_commit_date}" +%F)"
          today_local="$(TZ="${LOCAL_TIMEZONE}" date +%F)"
          current_hour_local="$(TZ="${LOCAL_TIMEZONE}" date +%H)"

          if [ "${GITHUB_EVENT_NAME}" = "schedule" ] && [ "${current_hour_local}" != "22" ]; then
            echo "should_publish=false" >> "${GITHUB_OUTPUT}"
            echo "Skipping schedule run outside local 10 PM. Current local hour: ${current_hour_local} (${LOCAL_TIMEZONE})."
            exit 0
          fi

          if [ "${latest_commit_day_local}" = "${today_local}" ]; then
            echo "should_publish=true" >> "${GITHUB_OUTPUT}"
            echo "Changes detected for ${today_local} (${LOCAL_TIMEZONE})."
          else
            echo "should_publish=false" >> "${GITHUB_OUTPUT}"
            echo "No changes detected for ${today_local} (${LOCAL_TIMEZONE}). Latest commit local day: ${latest_commit_day_local}."
          fi

  publish:
    needs: detect-changes
    if: needs.detect-changes.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: hopshare_test
          POSTGRES_USER: hopshare
          POSTGRES_PASSWORD: hopshare
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hopshare -d hopshare_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      HOPSHARE_DB_URL: postgres://hopshare:hopshare@localhost:5432/hopshare_test?sslmode=disable
      IMAGE_REPO: quay.io/hopshare/hopshare

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./... -count=1

      - name: Run vet
        run: go vet ./...

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Enable arm64 emulation
        run: |
          sudo podman run --rm --privileged docker.io/multiarch/qemu-user-static:latest --reset -p yes

      - name: Build multi-arch image with Podman
        env:
          MANIFEST_REF: localhost/hopshare-nightly:${{ github.sha }}-multi
        run: |
          podman build \
            --platform linux/amd64,linux/arm64 \
            --manifest "${MANIFEST_REF}" \
            -f Containerfile \
            .

      - name: Log in to Quay
        env:
          QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
          QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}
        run: |
          if [ -z "${QUAY_USERNAME}" ] || [ -z "${QUAY_PASSWORD}" ]; then
            echo "QUAY_USERNAME and QUAY_PASSWORD secrets are required."
            exit 1
          fi
          echo "${QUAY_PASSWORD}" | podman login quay.io -u "${QUAY_USERNAME}" --password-stdin

      - name: Publish nightly tags
        env:
          MANIFEST_REF: localhost/hopshare-nightly:${{ github.sha }}-multi
        run: |
          set -euo pipefail
          timestamp="$(date -u +%Y%m%d-%H%M)"
          short_sha="${GITHUB_SHA::12}"
          tags="nightly-${timestamp} nightly"

          for tag in ${tags}; do
            image="${IMAGE_REPO}:${tag}"
            podman manifest push --all "${MANIFEST_REF}" "docker://${image}"
            echo "Published ${image}"
          done
